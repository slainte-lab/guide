<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>🎧 Аудиогиды</title>
<link rel="stylesheet" href="css/style.css"/>
</head>
<body class="home">

<div class="home-wrap">
  <div class="home-hero">🎧</div>
  <div class="home-title">Аудиогиды</div>
  <div class="home-sub">Выберите город</div>

  <a class="city-card" href="bruges/">
    <div class="city-flag">🇧🇪</div>
    <div class="city-info">
      <div class="city-name">Брюгге</div>
      <div class="city-meta">13 остановок · ~7.5 км · полный день</div>
      <div class="city-tags">
        <span class="ctag ctag-s">Достопримечательности</span>
        <span class="ctag ctag-b">Пиво</span>
        <span class="ctag ctag-f">Еда</span>
      </div>
    </div>
    <div class="city-arr">›</div>
  </a>

  <a class="city-card" href="verona/">
    <div class="city-flag">🇮🇹</div>
    <div class="city-info">
      <div class="city-name">Верона</div>
      <div class="city-meta">8 остановок · ~5 км · транзит</div>
      <div class="city-tags">
        <span class="ctag ctag-s">Античность</span>
        <span class="ctag ctag-s">Средневековье</span>
        <span class="ctag ctag-f">Кухня</span>
      </div>
    </div>
    <div class="city-arr">›</div>
  </a>
</div>

</body>
</html>
